<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>License Control Panel</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 50px;
        }

        .box {
            display: inline-block;
            padding: 30px;
            border-radius: 15px;
            min-width: 300px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .work {
            background: #16a34a;
        }

        .dog {
            background: #dc2626;
        }

        h1 {
            margin-bottom: 10px;
        }

        #msg {
            margin-top: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div id="panel" class="box">
    <h1>Loading...</h1>
    <div id="msg"></div>
</div>

<script>
async function loadStatus() {
    try {
        const res = await fetch('action.json?v=' + Date.now());
        const data = await res.json();

        const panel = document.getElementById('panel');
        const msg = document.getElementById('msg');

        msg.innerText = data.message || '';

        if (data.status === "work") {
            panel.className = "box work";
            panel.innerHTML = `<h1>🟢 WORK</h1><div id="msg">${data.message || ''}</div>`;
        } 
        else if (data.status === "dog") {
            panel.className = "box dog";
            panel.innerHTML = `<h1>🔴 DOG (DISABLED)</h1><div id="msg">${data.message || ''}</div>`;
        } 
        else {
            panel.className = "box";
            panel.innerHTML = `<h1>⚠️ UNKNOWN STATUS</h1>`;
        }

    } catch (e) {
        document.getElementById('panel').innerHTML = "❌ load failed";
    }
}

loadStatus();
setInterval(loadStatus, 5000); // 每5秒刷新
</script>

</body>
</html>
