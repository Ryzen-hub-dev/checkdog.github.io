<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Action Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        h1 {
            color: #38bdf8;
        }
        .card {
            background: #1e293b;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        pre {
            background: #020617;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<h1>📄 Action.json 内容展示</h1>
<div id="content">加载中...</div>

<script>
async function loadJSON() {
    try {
        const response = await fetch('action.json');
        const data = await response.json();

        const container = document.getElementById('content');
        container.innerHTML = '';

        // 如果是数组
        if (Array.isArray(data)) {
            data.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <h3>Item ${index + 1}</h3>
                    <pre>${JSON.stringify(item, null, 2)}</pre>
                `;
                container.appendChild(div);
            });
        } else {
            // 如果是对象
            container.innerHTML = `
                <div class="card">
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                </div>
            `;
        }

    } catch (err) {
        document.getElementById('content').innerHTML = '❌ 加载失败: ' + err;
    }
}

loadJSON();
</script>

</body>
</html>
